<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Światło</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Światło"/>
<meta name="theme-color" content="#ffffff"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23fff'/%3E%3Ccircle cx='90' cy='90' r='40' fill='%23111'/%3E%3C/svg%3E"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, sans-serif;
    background: #fff;
    color: #111;
    padding: env(safe-area-inset-top, 0) 24px env(safe-area-inset-bottom, 24px);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    padding: 24px 0 4px;
  }

  /* status */
  #status {
    font-size: 13px;
    color: #888;
    margin-bottom: 32px;
  }
  #status span { color: #111; }

  /* ip row */
  .row {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
  }
  input {
    flex: 1;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 15px;
    outline: none;
    background: #f7f7f5;
    color: #111;
  }
  input:focus { border-color: #aaa; }

  /* buttons */
  button {
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    background: #f7f7f5;
    color: #111;
    font-size: 15px;
    padding: 10px 18px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background .15s;
    white-space: nowrap;
  }
  button:active { background: #ebebea; }

  /* main power button */
  #btn-light {
    width: 100%;
    padding: 18px;
    font-size: 17px;
    font-weight: 500;
    margin-bottom: 12px;
    border-radius: 10px;
  }
  #btn-light.on {
    background: #111;
    color: #fff;
    border-color: #111;
  }

  .label {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  section { margin-bottom: 28px; }

  /* log */
  #log {
    font-size: 12px;
    color: #aaa;
    line-height: 1.8;
  }
</style>
</head>
<body>

<h1>Światło</h1>
<div id="status">Status: <span id="s-txt">offline</span></div>

<section>
  <div class="label">Adres ESP32</div>
  <div class="row">
    <input id="ip" type="text" inputmode="text" placeholder="192.168.1.100:81" value="192.168.1.100:81"/>
    <button id="btn-conn" onclick="toggleConn()">Połącz</button>
  </div>
</section>

<section>
  <div class="label">Przekaźnik</div>
  <button id="btn-light" onclick="toggleLight()" disabled>Wyłączone</button>
</section>

<section>
  <div class="label">Log</div>
  <div id="log"></div>
</section>

<script>
let ws = null, isOn = false, connected = false;

const STXT  = document.getElementById('s-txt');
const BCONN = document.getElementById('btn-conn');
const BLIGHT = document.getElementById('btn-light');
const LOG   = document.getElementById('log');

function log(msg) {
  const t = new Date().toLocaleTimeString('pl-PL', {hour12:false});
  LOG.innerHTML = `${t} — ${msg}<br>` + LOG.innerHTML;
}

function setStatus(s) {
  connected = s === 'connected';
  STXT.textContent = { connected:'połączono', connecting:'łączenie…', disconnected:'offline' }[s];
  BCONN.textContent = connected ? 'Rozłącz' : 'Połącz';
  BLIGHT.disabled = !connected;
  if (!connected) setLight(false);
}

function setLight(v) {
  isOn = v;
  BLIGHT.textContent = v ? 'Włączone' : 'Wyłączone';
  BLIGHT.className = v ? 'on' : '';
}

function send(o) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); }

function toggleLight() {
  const next = !isOn;
  send({ cmd: 'relay', state: next });
  setLight(next);
  log(next ? 'światło włączone' : 'światło wyłączone');
}

function toggleConn() {
  if (ws && ws.readyState <= 1) { ws.close(); return; }
  const addr = document.getElementById('ip').value.trim();
  const url  = addr.startsWith('ws') ? addr : `ws://${addr}`;
  setStatus('connecting');
  log(`łączenie z ${url}`);
  try { ws = new WebSocket(url); } catch(e) { log(e.message); setStatus('disconnected'); return; }
  ws.onopen    = () => { setStatus('connected'); log('połączono'); send({cmd:'getState'}); };
  ws.onmessage = (e) => { try { const d = JSON.parse(e.data); if (d.relay !== undefined) setLight(d.relay); } catch {} };
  ws.onerror   = () => log('błąd połączenia');
  ws.onclose   = () => { setStatus('disconnected'); log('rozłączono'); ws = null; };
}

setStatus('disconnected');
</script>
</body>
</html>
